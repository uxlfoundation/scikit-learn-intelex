name: CI
on:
  pull_request:
    branches: [ "main" ]
  push:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

env:
  DPCTL_VERSION: 0.22.1
  DPNP_VERSION: 0.20.0
  DPCTL_PY_VERSIONS: '3.10\|3.14'
  UXL_PYTHONVERSION: "3.13"
  UXL_SKLEARNVERSION: "1.6"
  ONEDAL_REPO: "uxlfoundation/oneDAL"

jobs:

  onedal_nightly:
    runs-on: ubuntu-24.04
    name: Identify oneDAL nightly
    timeout-minutes: 2

    steps:
      - name: Get run ID of "Nightly-build" workflow
        id: get-run-id
        run: |
          WF_NAME="Nightly-build"
          JQ_QUERY='map(select(.event == "workflow_dispatch" or .event == "schedule")) | .[0].databaseId'
          RUN_ID=`gh run --repo ${{ env.ONEDAL_REPO }} list --workflow "${WF_NAME}" --json databaseId,event --status success --jq "${JQ_QUERY}"`
          echo "Detected latest run id of ${RUN_ID} for workflow ${WF_NAME}"
          echo "run-id=${RUN_ID}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
    outputs:
       run-id: ${{ steps.get-run-id.outputs.run-id }}
       uxl-python: ${{ env.UXL_PYTHONVERSION }}
       uxl-sklearn: ${{ env.UXL_SKLEARNVERSION }}

  sklearn_lnx:
    needs: onedal_nightly
    strategy:
      fail-fast: false
      matrix:
        include:
          - PYTHON_VERSION: "3.10"
            SKLEARN_VERSION: "1.6"
          - PYTHON_VERSION: "3.13"
            SKLEARN_VERSION: "1.8"
          - PYTHON_VERSION: "3.14"
            SKLEARN_VERSION: "1.9"
          - PYTHON_VERSION: "3.14t"
            SKLEARN_VERSION: "1.9"
    name: LinuxNightly/venv Python${{ matrix.PYTHON_VERSION }}_Sklearn${{ matrix.SKLEARN_VERSION }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}  
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_lnx
      - name: Download oneDAL environment artifact
        uses: actions/download-artifact@v8
        with:
          name: oneDAL_env
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .ci/env
      - name: Set Environment Variables
        id: set-env
        run: |
          # Disable SPMD testing
          echo "NO_DIST=1" >> "$GITHUB_ENV"
          # Determine dpctl support
          DPCFLAG="0"
          if [[ "${{ matrix.PYTHON_VERSION }}" != *t ]] && [ $(echo ${{ matrix.PYTHON_VERSION }} | grep '${{ env.DPCTL_PY_VERSIONS }}') ]; then DPCFLAG=''; fi
          echo "DPCFLAG=${DPCFLAG}" >> "$GITHUB_OUTPUT"
          # enable coverage report generation
          echo "COVERAGE_RCFILE=$(readlink -f .coveragerc)" >> "$GITHUB_ENV"
          if [[ -z $DPCFLAG ]]; then echo "SKLEARNEX_GCOV=1" >> "$GITHUB_ENV"; fi
      - name: apt-get
        run: sudo apt-get update
      - name: dpcpp installation
        run: |
          # This CI system yields oneAPI dependencies from the oneDAL repository
          bash .ci/env/apt.sh dpcpp
      - name: describe system
        run: |
          source /opt/intel/oneapi/setvars.sh
          bash .ci/scripts/describe_system.sh
      - name: Install develop requirements
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r dependencies-dev
          pip list
          echo "NUMPY_BUILD=$(python -m pip freeze | grep numpy)" >> "$GITHUB_ENV"
      - name: Build daal4py/sklearnex
        run: |
          source venv/bin/activate
          if [[ "${{ matrix.PYTHON_VERSION }}" == *t ]]; then
            # Build our DPC extension on free-threaded Python even though the
            # optional dpctl/dpnp client wheels do not publish a cp314t ABI.
            source .github/scripts/activate_components.sh
            python setup.py bdist_wheel
            pip install --force-reinstall --no-deps dist/*.whl
          else
            source .github/scripts/activate_components.sh ${{ steps.set-env.outputs.DPCFLAG }}
            python setup.py install --single-version-externally-managed --record=record.txt
          fi
      - name: Archive free-threaded wheel
        if: ${{ endsWith(matrix.PYTHON_VERSION, 't') }}
        uses: actions/upload-artifact@v7
        with:
          name: sklearnex_free_threaded_${{ matrix.PYTHON_VERSION }}
          path: dist/*.whl
      - name: Install testing requirements
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          bash .ci/scripts/setup_sklearn.sh ${{ matrix.SKLEARN_VERSION }}
          if [[ "${{ matrix.PYTHON_VERSION }}" == *t ]]; then
            # CatBoost and SHAP are optional integrations, not free-threaded
            # support requirements. Their tests skip when the packages are absent.
            grep -v -E '^(catboost|shap)==' requirements-test.txt > requirements-test-free-threaded.txt
            pip install --upgrade -r requirements-test-free-threaded.txt
          else
            pip install --upgrade -r requirements-test.txt
          fi
          if [ "${{ steps.set-env.outputs.DPCFLAG }}" == "" ]; then pip install dpctl==${{ env.DPCTL_VERSION }} dpnp==${{ env.DPNP_VERSION }}; fi
          pip list
      - name: Verify free-threaded wheel ABI
        if: ${{ endsWith(matrix.PYTHON_VERSION, 't') }}
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          cd /tmp
          PYTHON_GIL=0 python - <<'PY'
          import importlib
          import sys
          import sysconfig

          assert sysconfig.get_config_var("Py_GIL_DISABLED") == 1
          assert sysconfig.get_config_var("SOABI").startswith("cpython-314t-")
          assert not sys._is_gil_enabled()
          importlib.import_module("daal4py._daal4py")
          assert not sys._is_gil_enabled()

          # A DPC build exposes host and DPC pybind modules with overlapping
          # C++ type registrations. They are alternative backends and must not
          # be imported sequentially in one process. Exercise the package's
          # supported DPC selection path and verify the exact native module.
          onedal = importlib.import_module("onedal")
          dpc_backend = importlib.import_module("onedal._onedal_py_dpc")
          assert onedal._dpc_backend is not None
          assert onedal._dpc_backend.backend is dpc_backend
          assert onedal._default_backend is onedal._dpc_backend
          assert not sys._is_gil_enabled()

          importlib.import_module("sklearnex")
          assert not sys._is_gil_enabled()
          PY
      - name: Sklearnex testing
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearnex
          cd .ci
          ../conda-recipe/run_test.sh
      - name: Sklearn testing
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearn
          if [ "${{ steps.set-env.outputs.DPCFLAG }}" == "" ]; then export CPU=cpu; fi
          bash .ci/scripts/run_sklearn_tests.sh $CPU
      - name: Create coverage report
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh ${{ steps.set-env.outputs.DPCFLAG }}
          bash .github/scripts/generate_coverage_reports.sh lnx${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }} ${{ steps.set-env.outputs.DPCFLAG }}
      - name: Archive coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage_lnx_Py${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}
          path: |
            *_lnx${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}.info
      - name: Sklearn testing [preview]
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          if [ "${{ steps.set-env.outputs.DPCFLAG }}" == "" ]; then export CPU=cpu; fi
          export SKLEARNEX_PREVIEW='YES'
          bash .ci/scripts/run_sklearn_tests.sh $CPU

  tsan_lnx:
    needs: onedal_nightly
    name: Linux CPython3.14t ThreadSanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CC: clang-18
      CXX: clang++-18
      NO_DPC: "1"
      NO_DIST: "1"
      PYTHON_GIL: "0"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      SKLEARNEX_SANITIZER: thread
      TSAN_OPTIONS: halt_on_error=1:exitcode=66:log_path=/tmp/tsan-report

    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install free-threaded Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_lnx
      - name: Download oneDAL environment artifact
        uses: actions/download-artifact@v8
        with:
          name: oneDAL_env
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .ci/env
      - name: Install native runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 libclang-rt-18-dev
          bash .ci/env/apt.sh dpcpp
      - name: Install build and focused test requirements
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r dependencies-dev wheel
          pip install pytest scipy scikit-learn==1.9.0
      - name: Build ThreadSanitizer-instrumented host extensions
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh host-only
          python setup.py bdist_wheel
          pip install --force-reinstall --no-deps dist/*.whl
      - name: Verify ThreadSanitizer instrumentation
        run: |
          source venv/bin/activate
          extension_dir=$(python -c 'import sysconfig; print(sysconfig.get_path("platlib"))')
          mapfile -t daal4py_extensions < <(find "$extension_dir/daal4py" -maxdepth 1 -type f -name '_daal4py*.so')
          mapfile -t onedal_extensions < <(find "$extension_dir/onedal" -maxdepth 1 -type f -name '_onedal_py_host*.so')
          test "${#daal4py_extensions[@]}" -eq 1
          test "${#onedal_extensions[@]}" -eq 1
          for extension in "${daal4py_extensions[0]}" "${onedal_extensions[0]}"; do
            readelf --symbols --wide "$extension" | grep -q '__tsan_init'
            echo "TSan instrumented: $extension"
          done
      - name: Run focused free-threading tests under ThreadSanitizer
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh host-only
          export LD_PRELOAD=$(clang++-18 -print-file-name=libclang_rt.tsan-x86_64.so)
          test -f "$LD_PRELOAD"
          export TSAN_OPTIONS="${TSAN_OPTIONS}:suppressions=${GITHUB_WORKSPACE}/.github/tsan-suppressions.txt"
          rm -rf /tmp/sklearnex-tsan-tests
          mkdir /tmp/sklearnex-tsan-tests
          cp "$GITHUB_WORKSPACE/tests/test_native_threading.py" /tmp/sklearnex-tsan-tests/
          cp "$GITHUB_WORKSPACE/sklearnex/tests/test_free_threading.py" /tmp/sklearnex-tsan-tests/
          cd /tmp/sklearnex-tsan-tests
          dump_tsan_reports() {
            shopt -s nullglob
            for report in /tmp/tsan-report.*; do
              echo "=== $report ==="
              cat "$report"
            done
          }
          trap dump_tsan_reports EXIT
          python - <<'PY'
          import importlib
          import sys
          import sysconfig

          assert sysconfig.get_config_var("Py_GIL_DISABLED") == 1
          assert sysconfig.get_config_var("SOABI").startswith("cpython-314t-")
          assert not sys._is_gil_enabled()
          for module in ("daal4py._daal4py", "onedal._onedal_py_host"):
              importlib.import_module(module)
              assert not sys._is_gil_enabled()
          PY
          pytest -s -vv test_native_threading.py test_free_threading.py

  mpi_lnx:
    needs: onedal_nightly
    name: Linux CPython3.14t MPI two-rank
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      NO_DPC: "1"
      PYTHON_GIL: "0"

    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install free-threaded Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_lnx
      - name: Download oneDAL environment artifact
        uses: actions/download-artifact@v8
        with:
          name: oneDAL_env
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .ci/env
      - name: Install native runtime and MPI
        run: |
          sudo apt-get update
          bash .ci/env/apt.sh tbb
          sudo apt-get install -y intel-oneapi-mpi-devel
      - name: Install build and test requirements
        run: |
          python -m venv venv
          source venv/bin/activate
          source /opt/intel/oneapi/setvars.sh
          pip install -r dependencies-dev wheel scikit-learn
          # The generic mpi4py wheel can select a different MPI ABI and make
          # each Intel MPI-launched rank appear as a singleton communicator.
          MPICC=mpicc pip install --no-cache-dir --no-binary=mpi4py mpi4py
      - name: Build distributed host extensions
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          test -n "$I_MPI_ROOT"
          python setup.py bdist_wheel
          pip install --force-reinstall --no-deps dist/*.whl
      - name: Run free-threaded MPI two-rank smoke
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          cd /tmp
          mpiexec -n 2 python "$GITHUB_WORKSPACE/tests/mpi_lifecycle_smoke.py"

  sklearn_win:
    needs: onedal_nightly
    strategy:
      fail-fast: false
      matrix:
        include:
          - PYTHON_VERSION: "3.10"
            SKLEARN_VERSION: "1.6"
          - PYTHON_VERSION: "3.13"
            SKLEARN_VERSION: "1.8"
          - PYTHON_VERSION: "3.14"
            SKLEARN_VERSION: "1.9"
    name: WindowsNightly/venv Python${{ matrix.PYTHON_VERSION }}_Sklearn${{ matrix.SKLEARN_VERSION }}
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_win
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_win
      - name: Download Intel BaseKit artifact
        uses: actions/download-artifact@v8
        with:
          name: intel_oneapi_basekit
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
      - name: Decompress Intel BaseKit
        shell: cmd
        run: |
          tar -xvzf oneapi.tar.gz
          echo "Unzip complete"
      - name: Set Environment Variables
        id: set-env
        shell: cmd
        run: |
          echo C:\msys64\usr\bin;>> %GITHUB_PATH%
          echo NO_DIST=YES>> %GITHUB_ENV%
          set DPCTL_TEMP="${{ env.DPCTL_PY_VERSIONS }}"
          if not %DPCTL_TEMP:${{ matrix.PYTHON_VERSION }}=%==%DPCTL_TEMP% (
            echo DPCFLAG=>> %GITHUB_OUTPUT%
            echo SKLEARNEX_GCOV=YES>> %GITHUB_ENV%
          ) else (
            echo DPCFLAG="0">> %GITHUB_OUTPUT%
          )
          echo COVERAGE_RCFILE=%cd%\.coveragerc>> %GITHUB_ENV%
      - name: Download Intel OpenCL CPU Runtime artifact
        if: ${{ steps.set-env.outputs.DPCFLAG == '' }}
        uses: actions/download-artifact@v8
        with:
          name: opencl_rt_installer
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .
      - name: Install Intel OpenCL CPU Runtime
        if: ${{ steps.set-env.outputs.DPCFLAG == '' }}
        run: |
          Start-Process msiexec -ArgumentList "/i opencl_rt.msi /qn" -Wait
          echo "Installed Intel OpenCL CPU Runtime"
      - name: Install dependencies
        shell: cmd
        run: |
          python -m venv venv
          call .\venv\Scripts\activate.bat
          pip install --upgrade setuptools
          pip install cpufeature
          pip install -r dependencies-dev
          for /f "delims=" %%c in ('python -m pip freeze ^| grep numpy') do echo NUMPY_BUILD=%%c>> %GITHUB_ENV%
      - name: System info 
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\oneapi\setvars.bat
          bash .ci/scripts/describe_system.sh
      - name: Build daal4py/sklearnex
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          set PREFIX=.
          set PYTHON=python
          call .\conda-recipe\bld.bat
      - name: Install testing requirements
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          bash .ci/scripts/setup_sklearn.sh ${{ matrix.SKLEARN_VERSION }}
          pip install --upgrade -r requirements-test.txt
          if "${{ steps.set-env.outputs.DPCFLAG }}"=="" pip install dpctl==${{ env.DPCTL_VERSION }} dpnp==${{ env.DPNP_VERSION }}
          pip list
      - name: Sklearnex testing
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          set PYTHON=python
          set COVERAGE_FILE=%cd%\.coverage.sklearnex
          cd ..
          call scikit-learn-intelex\conda-recipe\run_test.bat scikit-learn-intelex\
      - name: Sklearn testing
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          set COVERAGE_FILE=%cd%\.coverage.sklearn
          if "${{ steps.set-env.outputs.DPCFLAG }}"=="" set CPU=cpu
          bash .ci/scripts/run_sklearn_tests.sh %CPU%
      - name: Create coverage report
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          bash .github/scripts/generate_coverage_reports.sh win${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}
      - name: Archive coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage_win_Py${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}
          path: |
             *_win${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}.info
      - name: Sklearn testing [preview]
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          if "${{ steps.set-env.outputs.DPCFLAG }}"=="" set CPU=cpu
          set SKLEARNEX_PREVIEW=YES
          bash .ci/scripts/run_sklearn_tests.sh %CPU%

  build_uxl:
    if: github.repository == 'uxlfoundation/scikit-learn-intelex'
    needs: onedal_nightly
    name: LinuxNightly build Python${{ needs.onedal_nightly.outputs.uxl-python }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.UXL_PYTHONVERSION }}
          cache: 'pip'
          cache-dependency-path: |
            **/dependencies-dev
            **/requirements-test.txt
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_lnx
      - name: Download oneDAL environment artifact
        uses: actions/download-artifact@v8
        with:
          name: oneDAL_env
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .ci/env
      - name: Set Environment Variables
        id: set-env
        run: |
          # Disable SPMD testing
          echo "NO_DIST=1" >> "$GITHUB_ENV"
          # enable coverage report generation
          echo "SKLEARNEX_GCOV=1" >> "$GITHUB_ENV"
      - name: apt-get
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: dpcpp installation
        run: |
          # This CI system yields oneAPI dependencies from the oneDAL repository
          bash .ci/env/apt.sh dpcpp
      - name: describe system
        run: |
          source /opt/intel/oneapi/setvars.sh
          bash .ci/scripts/describe_system.sh
      - name: Install develop requirements
        id: install-reqs
        run: |
          pip install -r dependencies-dev
          echo "numpy-version=$(python -m pip freeze | grep numpy)" >> "$GITHUB_OUTPUT"
          pip list
      - name: Build daal4py/sklearnex
        run: |
          source .github/scripts/activate_components.sh ${{ steps.set-env.outputs.DPCFLAG }}
          python setup.py bdist_wheel
      - name: Archive sklearnex build
        uses: actions/upload-artifact@v7
        with:
          name: sklearnex_build_${{ env.UXL_PYTHONVERSION }}
          path: |
             ./dist/*.whl
    
    outputs:
      numpy-version: ${{ steps.install-reqs.outputs.numpy-version }}
      
  test_uxl:
    strategy:
      fail-fast: false
      matrix:
        include:
          - OS: ubuntu-24.04
            FRAMEWORKS: "pytorch,numpy"
            DEVICE: cpu
    needs: [onedal_nightly, build_uxl]
    name: LinuxNightly [${{ matrix.FRAMEWORKS }}]-${{ matrix.DEVICE }} test Python${{ needs.onedal_nightly.outputs.uxl-python }}_Sklearn${{ needs.onedal_nightly.outputs.uxl-sklearn }}
    runs-on: ${{ matrix.OS }}
    timeout-minutes: 120
    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.UXL_PYTHONVERSION }}
          cache-dependency-path: |
            **/dependencies-dev
            **/requirements-test.txt
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_lnx
      - name: Download oneDAL environment artifact
        uses: actions/download-artifact@v8
        with:
          name: oneDAL_env
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .ci/env
      - name: Set Environment Variables
        id: set-env
        run: |
          echo "NO_DIST=1" >> "$GITHUB_ENV"
          # enable coverage report generation
          echo "COVERAGE_RCFILE=$(readlink -f .coveragerc)" >> "$GITHUB_ENV"
          echo "ONEDAL_PYTEST_FRAMEWORKS=${{ matrix.FRAMEWORKS }}" >> "$GITHUB_ENV"
          # reduce GPU driver/runner related memory issues
          echo "NEOReadDebugKeys=1" >> "$GITHUB_ENV"
          echo "EnableRecoverablePageFaults=1" >> "$GITHUB_ENV"
          echo "GpuFaultCheckThreshold=0" >> "$GITHUB_ENV"
          # set build numpy version for use in generating code coverage
          echo "NUMPY_BUILD=${{ needs.build_uxl.outputs.numpy-version }}" >> "$GITHUB_ENV"
      - name: apt-get
        run: sudo apt-get update
      - name: dpcpp installation
        run: |
          # This CI system yields oneAPI dependencies from the oneDAL repository
          bash .ci/env/apt.sh dpcpp
      - name: describe system
        run: |
          source /opt/intel/oneapi/setvars.sh
          bash .ci/scripts/describe_system.sh
      - name: Install test requirements
        run: |
          bash .ci/scripts/setup_sklearn.sh ${{ env.UXL_SKLEARNVERSION }}
          pip install --upgrade -r requirements-test.txt
          pip list
      - name: Download sklearnex wheel
        uses: actions/download-artifact@v8
        with:
          name: sklearnex_build_${{ env.UXL_PYTHONVERSION }}
      - name: Install PyTorch
        if: contains(matrix.FRAMEWORKS, 'pytorch')
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -c "import torch; _=[print(torch.xpu.get_device_name(i)) for i in range(torch.xpu.device_count())]" 
      - name: Install daal4py/sklearnex
        run: pip install *.whl
      - name: Sklearnex testing
        run: |
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearnex
          cd .ci
          ../conda-recipe/run_test.sh
      - name: Sklearn testing
        run: |
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearn
          bash .ci/scripts/run_sklearn_tests.sh ${{ matrix.DEVICE }}
      - name: Create coverage report
        run: |
          source .github/scripts/activate_components.sh
          bash .github/scripts/generate_coverage_reports.sh uxl_lnx_${{ matrix.DEVICE }}
      - name: Archive coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage_uxl_lnx_${{ matrix.DEVICE }}
          path: |
            *uxl_lnx_${{ matrix.DEVICE }}.info
      - name: Sklearn testing [preview]
        run: |
          source .github/scripts/activate_components.sh
          export SKLEARNEX_PREVIEW='YES'
          bash .ci/scripts/run_sklearn_tests.sh ${{ matrix.DEVICE }}
