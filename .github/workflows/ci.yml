# ------------------------------------------------------------------------------
# CI workflow overview
# ------------------------------------------------------------------------------
# This workflow builds and tests scikit-learn-intelex against the *nightly*
# oneDAL binaries produced by the uxlfoundation/oneDAL repository. Rather than
# building oneDAL from source, it downloads binaries from the other repository
# to save time while also enabling access to recent oneDAL development. This
# specifically contrasts conda focused development of other CIs, heavily relying
# on pip and venv instead.
# The high-level flow is:
#
#   onedal_nightly - sklearn_lnx   (matrix over Python x sklearn on Linux)
#                  - sklearn_win   (matrix over Python x sklearn on Windows)
#                  - build_uxl - test_uxl   (UXL Foundation dedicated flow)
#
# onedal_nightly locates the most recent successful "Nightly-build" workflow
# run in the oneDAL repo; every downstream job then downloads its build
# artifacts (headers/libs, oneAPI env scripts, and on Windows also the Intel
# BaseKit (always) and OpenCL runtime (DPC++ enabled sklearnex only)) via
# `actions/download-artifact` with a cross-repo `run-id`.
#
# A recurring toggle throughout the workflow is `DPCFLAG` (see comments in
# sklearn_lnx / sklearn_win): when empty, the job runs with the *full* Intel
# DPC++/oneAPI stack activated and additionally installs dpctl+dpnp so the
# SYCL-related python code paths are exercised. When non-empty ("0"), the job
# runs a CPU-only build with only TBB sourced from oneAPI and skips dpctl/dpnp.
# The `DPCTL_PY_VERSIONS` env var below is what selects which Python matrix
# entries take the full DPC++ path (see the DPCFLAG note in sklearn_lnx).
#
# This workflow follows the classic development path for oneDAL and oneAPI
# components by manually loading oneDAL dependencies via PATH related activation
# scripts (i.e. setvars.sh, vars.sh). It focuses on publicly-available
# components in order to verify that public oneAPI components can be used by
# general users in developing and testing the repository.
# ------------------------------------------------------------------------------

name: CI
on:
  # Run on PRs targeting main and on pushes to main. `workflow_dispatch`
  # additionally lets maintainers trigger the workflow manually from the
  # GitHub UI, which is useful when debugging changes or runs on forks.
  pull_request:
    branches: [ "main" ]
  push:
    branches:
      - main
  workflow_dispatch:

# Read-only token scope - this workflow only downloads artifacts and reads
# repo metadata; it never needs write access. This is for safety and follows
# best practices.
permissions: read-all

# Cancel in-progress runs for the same PR / branch when a new commit is pushed
# so we don't waste CI minutes on stale commits. The key includes event_name
# so that a push to main does not cancel a PR's parallel run and vice versa.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

env:
  # Pinned versions of the DPC++ Python array packages. dpctl provides the
  # SYCL device/queue objects and dpnp provides the numpy-like array backed
  # by SYCL USM allocations. Together they let sklearnex tests exercise the
  # SYCL code paths by using the OpenCL CPU RT.
  DPCTL_VERSION: 0.22.1
  DPNP_VERSION: 0.20.0
  # Python versions (as a `grep` alternation regex) for which the CI installs
  # and tests dpctl+dpnp. Only Python entries matching this pattern receive
  # the full DPC++ activation and the dpctl/dpnp pip install below. The other
  # matrix entries run a CPU-only build. This is done for verifying a host-only
  # build of the onedal interface which is otherwise not done in any CI system.
  DPCTL_PY_VERSIONS: '3.10\|3.14'
  # Python / sklearn combo used by the dedicated UXL Foundation build+test
  # flow (build_uxl / test_uxl below).
  UXL_PYTHONVERSION: "3.13"
  UXL_SKLEARNVERSION: "1.6"
  # Source repo for the nightly oneDAL binaries.
  ONEDAL_REPO: "uxlfoundation/oneDAL"

jobs:

  # ---------------------------------------------------------------------------
  # onedal_nightly
  # ---------------------------------------------------------------------------
  # Locate the latest successful "Nightly-build" run in the oneDAL repo and
  # export its `run-id` for downstream jobs to consume via
  # `actions/download-artifact` (cross-repo artifact download).
  # ---------------------------------------------------------------------------
  onedal_nightly:
    runs-on: ubuntu-24.04
    name: Identify oneDAL nightly
    timeout-minutes: 2

    steps:
      # Query the oneDAL repo for the most recent successful run of the
      # "Nightly-build" workflow, restricted to events that we actually
      # want to track (scheduled cron runs and manual dispatches). Runs
      # triggered by e.g. pull_request are excluded so we don't accidentally
      # pull artifacts from an unmerged PR.
      - name: Get run ID of "Nightly-build" workflow
        id: get-run-id
        run: |
          WF_NAME="Nightly-build"
          JQ_QUERY='map(select(.event == "workflow_dispatch" or .event == "schedule")) | .[0].databaseId'
          RUN_ID=`gh run --repo ${{ env.ONEDAL_REPO }} list --workflow "${WF_NAME}" --json databaseId,event --status success --jq "${JQ_QUERY}"`
          echo "Detected latest run id of ${RUN_ID} for workflow ${WF_NAME}"
          echo "run-id=${RUN_ID}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
    # Expose the resolved run id and the UXL Python/sklearn versions so the
    # display names of downstream jobs (test_uxl in particular) can render
    # them without re-reading the env block.
    outputs:
       run-id: ${{ steps.get-run-id.outputs.run-id }}
       uxl-python: ${{ env.UXL_PYTHONVERSION }}
       uxl-sklearn: ${{ env.UXL_SKLEARNVERSION }}

  # ---------------------------------------------------------------------------
  # sklearn_lnx: build + test on Linux across a Python x scikit-learn matrix
  # ---------------------------------------------------------------------------
  # The matrix pairs each Python version with the corresponding scikit-learn
  # release supported by that Python (per upstream sklearn's Python matrix).
  # `fail-fast: false` keeps failures in one row from cancelling the others,
  # which is important because the CPU-only row (no dpctl/dpnp) and the
  # DPC++ rows exercise very different code paths.
  # ---------------------------------------------------------------------------
  sklearn_lnx:
    needs: onedal_nightly
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported Python -> full DPC++ path (matches DPCTL_PY_VERSIONS).
          - PYTHON_VERSION: "3.10"
            SKLEARN_VERSION: "1.6"
          # Middle row -> CPU-only path; keeps coverage of the non-oneAPI build.
          - PYTHON_VERSION: "3.13"
            SKLEARN_VERSION: "1.8"
          # Newest supported Python -> full DPC++ path (matches DPCTL_PY_VERSIONS).
          - PYTHON_VERSION: "3.14"
            SKLEARN_VERSION: "1.9"
    name: LinuxNightly/venv Python${{ matrix.PYTHON_VERSION }}_Sklearn${{ matrix.SKLEARN_VERSION }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}
      # Pull the oneDAL binaries (headers, libs, env scripts) from the nightly
      # build identified above. `run-id` + `repository` do a cross-repo fetch.
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_lnx
      # Pull the oneDAL CI env scripts (apt.sh etc.) so we install the same
      # oneAPI apt packages that oneDAL itself was built against. This is to
      # limit maintenance and downtime caused by version mismatches between
      # repos.
      - name: Download oneDAL environment artifact
        uses: actions/download-artifact@v8
        with:
          name: oneDAL_env
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .ci/env
      # Sets:
      #   - NO_DIST=1 (SPMD/distributed testing is disabled in this workflow;
      #     it is covered by a separate MPI-enabled CI pipeline on Azure).
      #   - DPCFLAG output (see below).
      #   - COVERAGE_RCFILE - coverage report generation is always on.
      #   - SKLEARNEX_GCOV - gcov (native C++ coverage) is only enabled on
      #     DPC++ rows because generate_coverage_reports.sh drives gcov via
      #     `icx`'s bundled llvm-cov, and `icx` is only present on the runner
      #     when the full oneAPI env has been activated.
      #
      # DPCFLAG selection - controls whether this matrix row builds/tests
      # with the DPC++ (SYCL/GPU) code path or CPU-only.
      #
      #   DPCFLAG="" (empty)  -> full DPC++: activate all of oneAPI in
      #                          activate_components.sh, install dpctl+dpnp,
      #                          exercise GPU/SYCL code paths, and enable
      #                          gcov coverage of the SYCL sources.
      #   DPCFLAG="0"         -> CPU-only: source only TBB from oneAPI, do
      #                          NOT install dpctl/dpnp, do NOT emit gcov.
      #
      # The gating rule: DPCFLAG is empty iff the matrix Python version
      # matches DPCTL_PY_VERSIONS (currently 3.10 or 3.14). The middle
      # Python row (3.13) intentionally runs CPU-only - see the rationale
      # on DPCTL_PY_VERSIONS in the top-level env block.
      - name: Set Environment Variables
        id: set-env
        run: |
          echo "NO_DIST=1" >> "$GITHUB_ENV"
          DPCFLAG="0"
          if [ $(echo ${{ matrix.PYTHON_VERSION }} | grep '${{ env.DPCTL_PY_VERSIONS }}') ]; then DPCFLAG=''; fi
          echo "DPCFLAG=${DPCFLAG}" >> "$GITHUB_OUTPUT"
          echo "COVERAGE_RCFILE=$(readlink -f .coveragerc)" >> "$GITHUB_ENV"
          if [[ -z $DPCFLAG ]]; then echo "SKLEARNEX_GCOV=1" >> "$GITHUB_ENV"; fi
      - name: apt-get
        run: sudo apt-get update
      # Install the DPC++ compiler + oneAPI runtimes. The apt.sh script comes
      # from the oneDAL_env artifact above so it installs the exact oneAPI
      # version oneDAL was built against, avoiding version issues.
      - name: dpcpp installation
        run: bash .ci/env/apt.sh dpcpp
      - name: describe system
        run: |
          source /opt/intel/oneapi/setvars.sh
          bash .ci/scripts/describe_system.sh
      # Records the exact numpy version used to build the extension into
      # NUMPY_BUILD; the coverage step needs to reinstall the same numpy so
      # its headers are available to gcovr's source lookup during report
      # generation.
      - name: Install develop requirements
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r dependencies-dev
          pip list
          echo "NUMPY_BUILD=$(python -m pip freeze | grep numpy)" >> "$GITHUB_ENV"
      # Pass DPCFLAG so activate_components.sh sources the full oneAPI env
      # (DPCFLAG empty) or just TBB (DPCFLAG=="0"). This is what actually
      # switches the build between DPC++ and CPU-only.
      - name: Build daal4py/sklearnex
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh ${{ steps.set-env.outputs.DPCFLAG }}
          python setup.py install --single-version-externally-managed --record=record.txt
      # Only install dpctl/dpnp on DPC++ rows. On CPU-only rows the matching
      # wheels may not exist for this Python version and the test suite is
      # expected to run without them.
      - name: Install testing requirements
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          bash .ci/scripts/setup_sklearn.sh ${{ matrix.SKLEARN_VERSION }}
          pip install --upgrade -r requirements-test.txt
          if [ "${{ steps.set-env.outputs.DPCFLAG }}" == "" ]; then pip install dpctl==${{ env.DPCTL_VERSION }} dpnp==${{ env.DPNP_VERSION }}; fi
          pip list
      - name: Sklearnex testing
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearnex
          cd .ci
          ../conda-recipe/run_test.sh
      # On DPC++ rows we pass CPU=cpu so run_sklearn_tests.sh runs the sklearn
      # conformance suite pinned to the CPU device (dpctl is installed and
      # excercizes the `target_offload` functionality, enabling GPU conformance
      # when available). On CPU-only rows CPU is left unset and the script
      # substitutes `-d none`.
      - name: Sklearn testing
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearn
          if [ "${{ steps.set-env.outputs.DPCFLAG }}" == "" ]; then export CPU=cpu; fi
          bash .ci/scripts/run_sklearn_tests.sh $CPU
      # Pass DPCFLAG here as well so the coverage generation reactivates the
      # same env (full oneAPI vs TBB-only) that was used at build time - gcov
      # needs the matching compiler/runtime paths.
      - name: Create coverage report
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh ${{ steps.set-env.outputs.DPCFLAG }}
          bash .github/scripts/generate_coverage_reports.sh lnx${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }} ${{ steps.set-env.outputs.DPCFLAG }}
      - name: Archive coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage_lnx_Py${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}
          path: |
            *_lnx${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}.info
      # Re-run the sklearn conformance suite with SKLEARNEX_PREVIEW=YES to
      # exercise algorithms marked "preview" (not yet on by default). This is
      # a smoke test for preview-tier estimators and runs after coverage is
      # captured so it does not contaminate the main coverage numbers.
      - name: Sklearn testing [preview]
        run: |
          source venv/bin/activate
          source .github/scripts/activate_components.sh
          if [ "${{ steps.set-env.outputs.DPCFLAG }}" == "" ]; then export CPU=cpu; fi
          export SKLEARNEX_PREVIEW='YES'
          bash .ci/scripts/run_sklearn_tests.sh $CPU

  # ---------------------------------------------------------------------------
  # sklearn_win: mirror of sklearn_lnx on Windows
  # ---------------------------------------------------------------------------
  # The matrix, DPCFLAG logic, and step sequence intentionally mirror the
  # Linux job. Key Windows-specific differences:
  #   - Instead of `apt.sh dpcpp`, we download the Intel BaseKit as a tarball
  #     artifact from oneDAL and unpack it locally into .\oneapi. This is to
  #     save time, as the install takes significant time. There are bugs with
  #     this that the installer team refuses to fix (unnecessarily hardcoded
  #     paths on windows) making it fragile.
  #   - On DPC++ rows we also install the Intel OpenCL CPU Runtime MSI so
  #     dpctl can enumerate a SYCL device without a physical GPU.
  #   - Environment variables are set with `%GITHUB_ENV%` / `%GITHUB_OUTPUT%`
  #     from cmd; the DPCTL_PY_VERSIONS check is implemented via cmd's string
  #     substitution rather than grep.
  # ---------------------------------------------------------------------------
  sklearn_win:
    needs: onedal_nightly
    strategy:
      fail-fast: false
      matrix:
        include:
          - PYTHON_VERSION: "3.10"
            SKLEARN_VERSION: "1.6"
          - PYTHON_VERSION: "3.13"
            SKLEARN_VERSION: "1.8"
          - PYTHON_VERSION: "3.14"
            SKLEARN_VERSION: "1.9"
    name: WindowsNightly/venv Python${{ matrix.PYTHON_VERSION }}_Sklearn${{ matrix.SKLEARN_VERSION }}
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_win
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_win
      # Windows doesn't have a system package manager for oneAPI, so we pull
      # a prebuilt BaseKit tarball from oneDAL's nightly artifacts.
      - name: Download Intel BaseKit artifact
        uses: actions/download-artifact@v8
        with:
          name: intel_oneapi_basekit
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
      - name: Decompress Intel BaseKit
        shell: cmd
        run: |
          tar -xvzf oneapi.tar.gz
          echo "Unzip complete"
      # Prepends MSYS bash to PATH so we can reuse the Linux shell scripts
      # (describe_system.sh, run_sklearn_tests.sh, etc.) unchanged, then sets
      # NO_DIST and the Windows equivalent of DPCFLAG.
      #
      # DPCFLAG selection uses cmd's string substitution instead of `grep`:
      # if removing the current Python version from DPCTL_PY_VERSIONS changes
      # the string, then the version was present in the list and this row
      # takes the full DPC++ path (DPCFLAG empty + gcov enabled). Otherwise
      # DPCFLAG is set to "0" and the row runs CPU-only. See the sklearn_lnx
      # "Set Environment Variables" step for the full rationale on why
      # 3.10/3.14 get DPC++ and 3.13 does not.
      - name: Set Environment Variables
        id: set-env
        shell: cmd
        run: |
          echo C:\msys64\usr\bin;>> %GITHUB_PATH%
          echo NO_DIST=YES>> %GITHUB_ENV%
          set DPCTL_TEMP="${{ env.DPCTL_PY_VERSIONS }}"
          if not %DPCTL_TEMP:${{ matrix.PYTHON_VERSION }}=%==%DPCTL_TEMP% (
            echo DPCFLAG=>> %GITHUB_OUTPUT%
            echo SKLEARNEX_GCOV=YES>> %GITHUB_ENV%
          ) else (
            echo DPCFLAG="0">> %GITHUB_OUTPUT%
          )
          echo COVERAGE_RCFILE=%cd%\.coveragerc>> %GITHUB_ENV%
      # OpenCL CPU Runtime is only needed on DPC++ rows so dpctl can find a
      # SYCL-capable device on a runner without a GPU. Skipped on CPU-only.
      - name: Download Intel OpenCL CPU Runtime artifact
        if: ${{ steps.set-env.outputs.DPCFLAG == '' }}
        uses: actions/download-artifact@v8
        with:
          name: opencl_rt_installer
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .
      - name: Install Intel OpenCL CPU Runtime
        if: ${{ steps.set-env.outputs.DPCFLAG == '' }}
        run: |
          Start-Process msiexec -ArgumentList "/i opencl_rt.msi /qn" -Wait
          echo "Installed Intel OpenCL CPU Runtime"
      # Records the numpy build version into NUMPY_BUILD so its headers can
      # be reinstalled for gcovr's source lookup during coverage regeneration
      # (same rationale as the Linux job).
      - name: Install dependencies
        shell: cmd
        run: |
          python -m venv venv
          call .\venv\Scripts\activate.bat
          pip install --upgrade setuptools
          pip install cpufeature
          pip install -r dependencies-dev
          for /f "delims=" %%c in ('python -m pip freeze ^| grep numpy') do echo NUMPY_BUILD=%%c>> %GITHUB_ENV%
      - name: System info
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\oneapi\setvars.bat
          bash .ci/scripts/describe_system.sh
      # DPCFLAG argument to activate_components.bat selects between full
      # oneAPI setvars.bat (DPC++ build) and TBB-only vars.bat (CPU-only
      # build); see the .bat script for details.
      - name: Build daal4py/sklearnex
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          set PREFIX=.
          set PYTHON=python
          call .\conda-recipe\bld.bat
      # Only DPC++ rows install dpctl/dpnp - same reasoning as sklearn_lnx.
      - name: Install testing requirements
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          bash .ci/scripts/setup_sklearn.sh ${{ matrix.SKLEARN_VERSION }}
          pip install --upgrade -r requirements-test.txt
          if "${{ steps.set-env.outputs.DPCFLAG }}"=="" pip install dpctl==${{ env.DPCTL_VERSION }} dpnp==${{ env.DPNP_VERSION }}
          pip list
      - name: Sklearnex testing
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          set PYTHON=python
          set COVERAGE_FILE=%cd%\.coverage.sklearnex
          cd ..
          call scikit-learn-intelex\conda-recipe\run_test.bat scikit-learn-intelex\
      # Pin sklearn tests to the CPU device only when dpctl is installed
      # (DPC++ rows) - otherwise the default (no device flag) is fine.
      - name: Sklearn testing
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          set COVERAGE_FILE=%cd%\.coverage.sklearn
          if "${{ steps.set-env.outputs.DPCFLAG }}"=="" set CPU=cpu
          bash .ci/scripts/run_sklearn_tests.sh %CPU%
      - name: Create coverage report
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          bash .github/scripts/generate_coverage_reports.sh win${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}
      - name: Archive coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage_win_Py${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}
          path: |
             *_win${{ matrix.PYTHON_VERSION }}_${{ matrix.SKLEARN_VERSION }}.info
      - name: Sklearn testing [preview]
        shell: cmd
        run: |
          call .\venv\Scripts\activate.bat
          call .\.github\scripts\activate_components.bat ${{ steps.set-env.outputs.DPCFLAG }}
          if "${{ steps.set-env.outputs.DPCFLAG }}"=="" set CPU=cpu
          set SKLEARNEX_PREVIEW=YES
          bash .ci/scripts/run_sklearn_tests.sh %CPU%

  # ---------------------------------------------------------------------------
  # build_uxl / test_uxl: separate build+test pair used specifically by the
  # UXL Foundation mirror repository (uxlfoundation/scikit-learn-intelex).
  # ---------------------------------------------------------------------------
  # These jobs:
  #   1. Only run in the UXL fork (`if: github.repository == ...`), so forks
  #      and PRs against non-UXL clones skip them entirely.
  #   2. Split build from test - build_uxl produces a wheel artifact and
  #      test_uxl consumes it in a matrix of framework/device combinations.
  #      This is what enables running the same wheel against multiple
  #      frameworks (numpy + pytorch, and eventually GPU) without rebuilding.
  #      This was originally built to use a publicly-available SYCL-GPU runner
  #      which is now lost, is maintained for first pytorch testing. 
  #   3. Unlike sklearn_lnx / sklearn_win, they always run the DPC++ build
  #      (no DPCFLAG gating) - the UXL flow is where SYCL/xpu/pytorch
  #      coverage is expected.
  # ---------------------------------------------------------------------------
  build_uxl:
    if: github.repository == 'uxlfoundation/scikit-learn-intelex'
    needs: onedal_nightly
    name: LinuxNightly build Python${{ needs.onedal_nightly.outputs.uxl-python }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.UXL_PYTHONVERSION }}
          # Cache pip dependencies keyed on the dependency manifests to speed
          # up repeated build_uxl runs on the same commit range.
          cache: 'pip'
          cache-dependency-path: |
            **/dependencies-dev
            **/requirements-test.txt
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_lnx
      - name: Download oneDAL environment artifact
        uses: actions/download-artifact@v8
        with:
          name: oneDAL_env
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .ci/env
      # Sets NO_DIST=1 (SPMD testing disabled, same reason as sklearn_lnx)
      # and SKLEARNEX_GCOV=1 (native gcov coverage is unconditionally enabled
      # here since the UXL flow always builds with DPC++).
      - name: Set Environment Variables
        id: set-env
        run: |
          echo "NO_DIST=1" >> "$GITHUB_ENV"
          echo "SKLEARNEX_GCOV=1" >> "$GITHUB_ENV"
      - name: apt-get
        run: sudo apt-get update
      # This CI system yields oneAPI dependencies from the oneDAL repository.
      - name: dpcpp installation
        run: bash .ci/env/apt.sh dpcpp
      - name: describe system
        run: |
          source /opt/intel/oneapi/setvars.sh
          bash .ci/scripts/describe_system.sh
      # Exposes the built numpy version as a job output so test_uxl (which
      # runs on a different runner) can pin the same numpy when regenerating
      # coverage against the wheel produced here.
      - name: Install develop requirements
        id: install-reqs
        run: |
          pip install -r dependencies-dev
          echo "numpy-version=$(python -m pip freeze | grep numpy)" >> "$GITHUB_OUTPUT"
          pip list
      # build_uxl's set-env step never writes a DPCFLAG output, so this
      # expands to no arg → activate_components.sh sources the full oneAPI
      # environment (DPC++ build).
      - name: Build daal4py/sklearnex
        run: |
          source .github/scripts/activate_components.sh ${{ steps.set-env.outputs.DPCFLAG }}
          python setup.py bdist_wheel
      - name: Archive sklearnex build
        uses: actions/upload-artifact@v7
        with:
          name: sklearnex_build_${{ env.UXL_PYTHONVERSION }}
          path: |
             ./dist/*.whl

    outputs:
      # Passed forward to test_uxl so its coverage step can reinstall the
      # same numpy the wheel was built against - gcovr needs those headers
      # available during report generation.
      numpy-version: ${{ steps.install-reqs.outputs.numpy-version }}

  test_uxl:
    strategy:
      fail-fast: false
      matrix:
        # Framework/device combos to test the UXL wheel against. Currently
        # a single CPU row exercising both PyTorch and numpy; the matrix is
        # kept in `include:` form so GPU or additional-framework rows can be
        # added incrementally without restructuring.
        include:
          - OS: ubuntu-24.04
            FRAMEWORKS: "pytorch,numpy"
            DEVICE: cpu
    needs: [onedal_nightly, build_uxl]
    name: LinuxNightly [${{ matrix.FRAMEWORKS }}]-${{ matrix.DEVICE }} test Python${{ needs.onedal_nightly.outputs.uxl-python }}_Sklearn${{ needs.onedal_nightly.outputs.uxl-sklearn }}
    runs-on: ${{ matrix.OS }}
    timeout-minutes: 120
    steps:
      - name: Checkout Scikit-learn-intelex
        uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.UXL_PYTHONVERSION }}
          cache-dependency-path: |
            **/dependencies-dev
            **/requirements-test.txt
      - name: Download oneDAL build artifact
        uses: actions/download-artifact@v8
        with:
          name: __release_lnx
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: ./__release_lnx
      - name: Download oneDAL environment artifact
        uses: actions/download-artifact@v8
        with:
          name: oneDAL_env
          github-token: ${{ github.token }}
          repository: ${{ env.ONEDAL_REPO }}
          run-id: ${{ needs.onedal_nightly.outputs.run-id }}
          path: .ci/env
      # Sets:
      #   - NO_DIST=1 (SPMD testing disabled).
      #   - COVERAGE_RCFILE (enable coverage report generation).
      #   - ONEDAL_PYTEST_FRAMEWORKS - tells onedal's pytest layer which
      #     array frameworks are available so it can parametrize
      #     framework-specific tests accordingly.
      #   - NEO (Intel compute runtime) tunables to reduce spurious GPU
      #     driver/OOM crashes on shared GitHub runners. These have no effect
      #     on CPU-only rows but are set unconditionally to keep the matrix
      #     step simple; leaving them on for future GPU rows.
      #     TODO: drop these if a GPU row never lands in the test_uxl matrix.
      #   - NUMPY_BUILD - pin numpy to the version the wheel was built
      #     against (see build_uxl.outputs.numpy-version) so its headers are
      #     available to gcovr's source lookup during coverage regeneration.
      - name: Set Environment Variables
        id: set-env
        run: |
          echo "NO_DIST=1" >> "$GITHUB_ENV"
          echo "COVERAGE_RCFILE=$(readlink -f .coveragerc)" >> "$GITHUB_ENV"
          echo "ONEDAL_PYTEST_FRAMEWORKS=${{ matrix.FRAMEWORKS }}" >> "$GITHUB_ENV"
          echo "NEOReadDebugKeys=1" >> "$GITHUB_ENV"
          echo "EnableRecoverablePageFaults=1" >> "$GITHUB_ENV"
          echo "GpuFaultCheckThreshold=0" >> "$GITHUB_ENV"
          echo "NUMPY_BUILD=${{ needs.build_uxl.outputs.numpy-version }}" >> "$GITHUB_ENV"
      - name: apt-get
        run: sudo apt-get update
      # This CI system yields oneAPI dependencies from the oneDAL repository.
      - name: dpcpp installation
        run: bash .ci/env/apt.sh dpcpp
      - name: describe system
        run: |
          source /opt/intel/oneapi/setvars.sh
          bash .ci/scripts/describe_system.sh
      - name: Install test requirements
        run: |
          bash .ci/scripts/setup_sklearn.sh ${{ env.UXL_SKLEARNVERSION }}
          pip install --upgrade -r requirements-test.txt
          pip list
      # Pull the wheel produced by build_uxl in the previous job.
      - name: Download sklearnex wheel
        uses: actions/download-artifact@v8
        with:
          name: sklearnex_build_${{ env.UXL_PYTHONVERSION }}
      # PyTorch is installed only when the matrix row requests it, and always
      # from the CPU wheel index - the runner has no GPU. We then print the
      # torch.xpu device list so failures with xpu-backed tests can be
      # correlated with what the runtime actually detected at test time.
      - name: Install PyTorch
        if: contains(matrix.FRAMEWORKS, 'pytorch')
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -c "import torch; _=[print(torch.xpu.get_device_name(i)) for i in range(torch.xpu.device_count())]"
      - name: Install daal4py/sklearnex
        run: pip install *.whl
      - name: Sklearnex testing
        run: |
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearnex
          cd .ci
          ../conda-recipe/run_test.sh
      - name: Sklearn testing
        run: |
          source .github/scripts/activate_components.sh
          export COVERAGE_FILE=$(pwd)/.coverage.sklearn
          bash .ci/scripts/run_sklearn_tests.sh ${{ matrix.DEVICE }}
      - name: Create coverage report
        run: |
          source .github/scripts/activate_components.sh
          bash .github/scripts/generate_coverage_reports.sh uxl_lnx_${{ matrix.DEVICE }}
      - name: Archive coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage_uxl_lnx_${{ matrix.DEVICE }}
          path: |
            *uxl_lnx_${{ matrix.DEVICE }}.info
      - name: Sklearn testing [preview]
        run: |
          source .github/scripts/activate_components.sh
          export SKLEARNEX_PREVIEW='YES'
          bash .ci/scripts/run_sklearn_tests.sh ${{ matrix.DEVICE }}
