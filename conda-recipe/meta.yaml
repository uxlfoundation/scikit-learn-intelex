# NB: this recipe should be synced between sklearnex repo and feedstocks

{% set name = "scikit-learn-intelex" %}
{% set buildnumber = 0 %}
# version is set manually in feedstocks and through git tag in repo
# {% set version = "1.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ environ.get('GIT_DESCRIBE_TAG') }}
  # version: {{ version }}

# Reminder: source should point to path for repo or github archive for feedstock
# source:
#   url: https://github.com/uxlfoundation/scikit-learn-intelex/archive/{{ version }}.tar.gz
#   sha256: ...
source:
  path: ..

build:
  skip: true  # [not (linux64 or win)]
  number: {{ buildnumber }}
  include_recipe: False
  script_env:
    - DPCPPROOT
    - DALROOT
    - NO_DIST=1  # [win]

# Top-level requirements apply to the shared build.sh/bld.bat that compiles
# and stages host + dpc artifacts once. Each output's pack.sh then copies
# the subset of files that belong to that output.
requirements:
  build:
    - make  # [linux]
    - {{ compiler('dpcpp') }}
    - {{ compiler('cxx') }}
    # conda-forge feedstock specific
    # - {{ stdlib("c") }}  # [linux64 or win]
  host:
    - python
    - setuptools
    - cmake
    - clang-format
    - cython
    - jinja2
    - pybind11
    - numpy >=2,<3
    # dal-devel pinning depends on the recipe location (repo or feedstock)
    - dal-devel
    # - dal-devel =={{ version }}
    - impi-devel  # [not win]
    - mpi * impi  # [not win]

outputs:
  - name: scikit-learn-intelex
    build:
      # Suppress dpcpp run_exports so CPU package doesn't pull intel-sycl-rt.
      ignore_run_exports_from:
        - {{ compiler('dpcpp') }}
    script: pack.sh  # [linux]
    script: pack.bat  # [win]
    requirements:
      build:
        - make  # [linux]
        - {{ compiler('dpcpp') }}
        - {{ compiler('cxx') }}
      host:
        - python
        - setuptools
        - numpy >=2,<3
        - dal-devel
        - impi-devel  # [not win]
        - mpi * impi  # [not win]
      run:
        - python
        - numpy
        - scikit-learn
        # dal-devel has run_exports on conda-forge, so no need to add it.
        - mpi * impi  # [not win]
        - packaging
    test:
      requires:
        - pyyaml
        # next deps are synced with requirements-test.txt
        - pytest
        - pytest-mock
        - pandas
        - xgboost
        - lightgbm
        - shap
        - catboost
        - treelite
        - array-api-compat
        - array-api-strict
        - polars
      source_files:
        - .ci
        - setup.cfg
        - examples
        - tests
      commands:
        - python -c "from sklearnex import patch_sklearn; patch_sklearn()"
        # CPU host backend must be present.
        - python -c "import onedal._onedal_py_host"
        # DPC backend must NOT be in the CPU package.
        - python -c "import onedal, os, glob; d = os.path.dirname(onedal.__file__); assert not glob.glob(os.path.join(d, '_onedal_py_dpc*')) and not glob.glob(os.path.join(d, '_onedal_py_spmd_dpc*')), 'DPC backend leaked into CPU package'"  # [linux]
    about:
      summary: Extension for Scikit-learn* (CPU runtime) is a seamless way to speed up your Scikit-learn application.

  - name: scikit-learn-intelex-gpu
    build:
      # No ignore_run_exports_from — GPU package inherits intel-sycl-rt via dpcpp.
    script: pack.sh  # [linux]
    script: pack.bat  # [win]
    requirements:
      build:
        - make  # [linux]
        - {{ compiler('dpcpp') }}
      host:
        - python
        - setuptools
        - numpy >=2,<3
        - dal-devel
        - dal-gpu
        - impi-devel  # [not win]
        - mpi * impi  # [not win]
      run:
        - {{ pin_subpackage('scikit-learn-intelex', exact=True) }}
        - dal-gpu
        # intel-sycl-rt injected automatically via dpcpp compiler run_exports.
    test:
      requires:
        - dpcpp-cpp-rt
      commands:
        # Ensure dpc module can be imported.
        - python -c "import onedal._onedal_py_dpc"
        - python -c "import onedal._onedal_py_spmd_dpc"  # [not win]
    about:
      summary: Extension for Scikit-learn* (GPU/DPC++ runtime) — enables oneAPI SYCL-based acceleration.

about:
  home: https://uxlfoundation.github.io/scikit-learn-intelex
  license: Apache-2.0
  license_file:
    - LICENSE
    - doc/third-party-programs-sklearnex.txt
  summary: Extension for Scikit-learn* is a seamless way to speed up your Scikit-learn application.
  description: |
    <strong>LEGAL NOTICE: Use of this software package is subject to the
    software license agreement (as set forth above, in the license section of
    the installed Conda package and/or the README file) and all notices,
    disclaimers or license terms for third party or open source software
    included in or with the software.</strong>
    <br/><br/>
    EULA: <a href="https://opensource.org/licenses/Apache-2.0" target="_blank">Apache-2.0</a>
    <br/><br/>
  dev_url: https://github.com/uxlfoundation/scikit-learn-intelex
  doc_url: https://uxlfoundation.github.io/scikit-learn-intelex

extra:
  recipe-maintainers:
    # GitHub IDs for maintainers of the recipe.
    - napetrov
    - Alexsandruss
    - maria-Petrova
    - ethanglaser
